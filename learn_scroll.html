<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn Horizontal Scroll</title>
    <link rel="stylesheet" href="learn_scroll.css">
</head>
<body>

    <div class="normal-section">
        <h1>Keep scrolling down! 👇</h1>
        <p>This is just a normal section of a website.</p>
    </div>

    <!-- Step 1: The Magic Wrapper -->
    <!-- This wrapper is extremely tall (e.g., 400vh) to force the browser to let you scroll for a long time -->
     <section class="magic-wrapper"> 
        
        <!-- Step 2: The Sticky Window
        This div "sticks" to the screen and doesn't let you scroll past it until you reach the bottom of the magic -wrapper  -->
        <div class="sticky-window">
           
            <!-- Step 3: The Horizontal Track 
            This is a very wide div that holds all our items in a horizontal row  -->
             <div class="horizontal-track">
                <div class="box red">Box 1</div>
                <div class="box blue">Box 2</div>
                <div class="box green">Box 3</div>
                <div class="box yellow">Box 4</div>
            </div> 

        </div> 

    </section>

    <div class="normal-section">
        <h1>You reached the end! 🎉</h1>
        <p>The sticky window unlocked and you are scrolling normally again.</p>
    </div>

    <script src="learn_scroll.js"></script>
</body>
</html>
