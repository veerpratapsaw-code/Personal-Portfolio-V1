<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon | Veer Pratap Saw</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #02020c;
      color: #fff;
      font-family: 'Space Grotesk', 'Montserrat', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      overflow: hidden;
    }
    .container {
      max-width: 600px;
      padding: 40px;
      margin: 20px;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(124, 58, 237, 0.5);
      border-radius: 20px;
      box-shadow: 0 0 50px rgba(124, 58, 237, 0.3), inset 0 0 20px rgba(124, 58, 237, 0.1);
      backdrop-filter: blur(10px);
    }
    h1 {
      color: #c4adeb;
      font-size: 2.5rem;
      margin-bottom: 20px;
      margin-top: 0;
    }
    p {
      color: #cbd5e1;
      font-size: 1.15rem;
      line-height: 1.6;
      margin-bottom: 35px;
    }
    .back-btn {
      display: inline-block;
      background: linear-gradient(45deg, #7c3aed, #4f46e5);
      color: white;
      padding: 12px 28px;
      text-decoration: none;
      border-radius: 30px;
      font-weight: bold;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .back-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(124, 58, 237, 0.4);
    }
    /* Simple glowing orb background */
    .glow-orb {
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.3) 0%, transparent 70%);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: -1;
      animation: pulse 4s ease-in-out infinite alternate;
    }
    @keyframes pulse {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
      100% { transform: translate(-50%, -50%) scale(1.5); opacity: 1; }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="glow-orb"></div>
  <div class="container">
    <h1>Coming Soon</h1>
    <p>Detailed blogs, tutorials, and source code for these projects will be available very soon. Stay tuned!</p>
    <a href="index.html" class="back-btn">Return to Portfolio</a>
  </div>
</body>
</html>
